<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>RAG Assistant</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar">

<h2>📚 RAG Assistant</h2>

<div class="upload-card">

<input type="file" id="files" multiple>
<p id="file-session-note"></p>

<button onclick="uploadFiles()">Upload Files</button>

<div class="progress">
<div id="progress-bar"></div>
</div>

<p id="status"></p>

</div>

<div class="documents-header">
<h3>Your Documents</h3>
<button id="clear-files" type="button">Delete All</button>
</div>

<div id="files-list"></div>

<div class="history-header">
<h3>Query History</h3>
<button id="clear-history" type="button">Delete All</button>
</div>

<div id="history"></div>

</div>


<!-- CHAT AREA -->

<div class="chat-container">
 
<div class="chat-header">
 
<span>AI Document Assistant</span>
<button id="clear-chat" type="button">Clear Chat</button>
 
</div>

<div id="chat" class="chat"></div>

<div class="chat-input">

<input id="query" placeholder="Ask anything about your documents...">

<button onclick="ask()">Send</button>

</div>

</div>

</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>

</html>
